<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malla Interactiva de Administración - FCEA Udelar</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="anonymous">
</head>
<body>

  <header class="main-header">
    <div class="header-container">
      <div class="logo-area">
        <h1>Malla Interactiva</h1>
        <h2>Lic. en Administración — FCEA</h2>
      </div>
      <div id="auth-status" class="auth-status-area">
        <button id="btn-login" class="btn-primary-auth">Iniciar Sesión con Google</button>
      </div>
    </div>
  </header>

  <section class="kpi-dashboard-container">
    <div class="kpi-card">
      <span class="kpi-title">Créditos Acumulados</span>
      <span id="kpi-creditos" class="kpi-value">0</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-title">Materias Aprobadas</span>
      <span id="kpi-aprobadas" class="kpi-value">0 / 42</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-title">Promedio Estimado</span>
      <span id="kpi-promedio" class="kpi-value">0.0</span>
    </div>
  </section>

  <div class="sticky-controls-wrapper">
    
    <div class="filters-panel" id="filters-sidebar">
      <div class="filters-header-mobile">
        <h3>Filtros Avanzados</h3>
        <button class="btn-close-x" id="btn-close-filters">×</button>
      </div>
      
      <div class="filters-layout-grid custom-6-cols">
        <input type="search" id="search-input" placeholder="Buscar materia por nombre...">
        
        <select id="filter-area">
          <option value="">Todas las Áreas</option>
          <option value="Administración">Administración</option>
          <option value="Contabilidad">Contabilidad</option>
          <option value="Economía">Economía</option>
          <option value="Métodos Cuantitativos">Métodos Cuantitativos</option>
          <option value="Jurídica">Jurídica</option>
          <option value="Integradora">Integradora y Otras</option>
        </select>
        
        <select id="filter-tipo">
          <option value="">Todos los Tipos (OB/OP)</option>
          <option value="OB">Obligatorias (OB)</option>
          <option value="OP">Opcionales (OP)</option>
        </select>
        
        <select id="filter-estado">
          <option value="">Todos los Estados</option>
          <option value="aprobada">Aprobadas</option>
          <option value="cursando">Cursando</option>
          <option value="pendiente">Pendientes</option>
        </select>
        
        <select id="filter-previas">
          <option value="">Estado de Previas</option>
          <option value="disponible">Disponibles p/ cursar</option>
          <option value="bloqueada">Bloqueadas</option>
        </select>
        
        <div class="calculo-col-container">
          <select id="trayectoria-calculo">
            <option value="recom">Trayectoria Recomendada</option>
            <option value="min">Mínimo esfuerzo</option>
          </select>
        </div>
      </div>
    </div>

    <div class="semestres-panel" id="semestres-sidebar">
      <div class="semestres-header-mobile">
        <h3>Seleccionar Semestre</h3>
        <button class="btn-close-x" id="btn-close-semestres">×</button>
      </div>
      <div class="semestres-buttons-grid">
        <button class="btn-semestre active" data-semestre="1">1° Semestre</button>
        <button class="btn-semestre" data-semestre="2">2° Semestre</button>
        <button class="btn-semestre" data-semestre="3">3° Semestre</button>
        <button class="btn-semestre" data-semestre="4">4° Semestre</button>
        <button class="btn-semestre" data-semestre="5">5° Semestre</button>
        <button class="btn-semestre" data-semestre="6">6° Semestre</button>
        <button class="btn-semestre" data-semestre="7">7° Semestre</button>
        <button class="btn-semestre" data-semestre="8">8° Semestre</button>
        <button class="btn-semestre" data-semestre="todos">Ver Todos</button>
      </div>
    </div>

  </div>

  <main class="grid-content-container">
    <div id="list" class="materias-cards-grid">
      </div>
  </main>

  <div class="mobile-floating-actions">
    <button id="btn-open-filters" class="btn-floating">
      <span class="icon">🔍</span> Filtros
    </button>
    <button id="btn-open-semestres" class="btn-floating highlight">
      <span class="icon">📅</span> Semestres
    </button>
  </div>

  <script type="module" src="js/app.firebase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
